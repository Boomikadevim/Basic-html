<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Cards & Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ================= PAGE 1 ================= */

#page1{
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#36d1dc,#5b86e5);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.container{
    position:relative;
    width:900px;
    height:500px;
}

.card{
    position:absolute;
    width:250px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
}

.card-header{
    height:40px;
    display:flex;
    align-items:center;
    padding-left:15px;
    font-weight:bold;
    border-bottom:1px solid #ddd;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card1{
    left:180px;
    top:150px;
    z-index:1;
}

.card2{
    left:330px;
    top:100px;
    z-index:2;
}

.card3{
    left:480px;
    top:50px;
    z-index:3;
}

.next-btn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:14px 35px;
    border:none;
    border-radius:30px;
    background:white;
    color:#333;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.next-btn:hover{
    background:#f1f1f1;
}

/* ================= PAGE 2 ================= */

#page2{
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;

    background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1600');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.login-box{
    width:400px;
    padding:45px;
    border-radius:25px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 8px 32px rgba(0,0,0,0.4);

    text-align:center;
}

.login-box h1{
    color:white;
    margin-bottom:25px;
    font-size:38px;
    text-shadow:2px 2px 10px rgba(0,0,0,0.5);
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    outline:none;
    background:rgba(255,255,255,0.9);
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(to right,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.login-btn:hover{
    opacity:0.9;
}

.back-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#444;
    color:white;
    margin-top:10px;
    cursor:pointer;
}

.back-btn:hover{
    background:#222;
}
</style>
</head>

<body>

<!-- PAGE 1 -->

<div id="page1">

    <div class="container">

        <div class="card card1">
            <div class="card-header">Nature</div>
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=500">
        </div>

        <div class="card card2">
            <div class="card-header">Mountain</div>
            <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500">
        </div>

        <div class="card card3">
            <div class="card-header">Forest</div>
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500">
        </div>

    </div>

    <button class="next-btn" onclick="showLogin()">
        Explore →
    </button>

</div>

<!-- PAGE 2 -->

<div id="page2">

    <div class="login-box">

        <h1>Explore With Us</h1>

        <div class="input-box">
            <input type="text" placeholder="Username">
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <button class="login-btn">Login</button>

        <button class="back-btn" onclick="goBack()">
            Back
        </button>

    </div>

</div>

<script>
function showLogin(){
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="flex";
}

function goBack(){
    document.getElementById("page2").style.display="none";
    document.getElementById("page1").style.display="flex";
}
</script>

</body>
</html>
